download:
  podcasts_path: /home/nikita/balalaika
  episodes_limit: 4
  num_workers: 10
  parquet_path: /home/nikita/balalaika/balalaika.parquet
  podcasts_urls:  
    - 'https://music.yandex.ru/album/21851634'   

preprocess:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the podcasts are located 
  duration: 15
  device: 'cuda'
  num_workers: 2
  whisper_model: 'large-v3'
  compute_type: 'float16'
  beam_size: 5

separation:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the chopped podcasts are located 
  device: 'cuda'
  num_workers: 1
  use_nisqa: True 
  use_mono: True  
  nisqa_config: "/home/nikita/yapoddataset/configs/nisqa_s.yaml"
  one_speaker: False

transcription:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the chopped podcasts are located 
  model_name: "rnnt"  
  num_workers: 4 # per one gpu

punctuation:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the chopped podcasts are located 
  model_name: "RUPunct/RUPunct_big"
  num_workers: 4 # per one gpu

accent:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the chopped podcasts are located 
  num_workers: 4
  model_name: turbo3.1
  device: cuda

yofication:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the chopped podcasts are located 
  num_workers: 2

phonemizer:
  podcasts_path: /home/nikita/balalaika # full path to the folder where the text files are located
  num_workers: 2 # per one gpu

classification:
  podcasts_path: /home/nikita/balalaika
  threshold: 0.8
  device: cuda
  model_path: models/voxblink2_samresnet100_ft


  
