download:
  podcasts_path: /mnt/disk1tb/radio-v4
  episodes_limit: 100 # limit on downloading episodes from one playlist
  num_workers: 1
  podcasts_urls_file: '/home/nikita/yapoddataset/pickls/single.pkl' # pkl with urls
  
preprocess:
  podcasts_path: /mnt/disk1tb/radio-v4 # full path to the folder where the podcasts are located 
  duration: 15 # in seconds (each sample will be no longer than this time.)
  num_workers: 2
  smart_vad_model: /home/nikita/yapoddataset/src/libs/smart_turn/smart-turn-v3.0.onnx

  silero_vad_threshold:  0.4
  smart_vad_threshold: 0.4 

  
separation:
  podcasts_path: /mnt/disk1tb/radio-v4 # full path to the folder where the chopped podcasts are located 
  # diar parms
  num_workers_diarization: 4
  one_speaker: True # When this option is enabled, only single-speaker audio recordings are downloaded.
  # nisqa parms
  bs: 32
  num_workers_nisqa: 12
  # audio detect 
  num_workers_detect: 2
  checkpoint_path: /home/nikita/audio_detect/wavlm-endpointing-model/checkpoint-3000/music_detection.safetensors # /home/nikita/yapoddataset/models/audio_detect/model.safetensors
  threshold: 0.2442

transcription:
  podcasts_path: /mnt/disk1tb/radio-v4 # full path to the folder where the chopped podcasts are located 
  with_timestamps: True
  model_names: ['giga_ctc_lm', 'vosk', 'tone', 'giga_ctc', 'giga_rnnt'] # 'tone' ['vosk','tone']

  giga: 
    num_workers: 2 # per one gpu
    batch_size: 16 # if supported
    lm_path: '/home/nikita/yapoddataset/kenlm.bin' # path to lm.bin for giga ctc model

  vosk:
    vosk_path: /home/nikita/yapoddataset/models/vosk-model-ru
    num_workers: 2 # per one gpu
    batch_size: 12 # if supported
    beam_size: 4
    lm_scale: 0.2 
    ngram_lm_scale: -0.1

  tone:
    num_workers: 2 # per one gpu
    batch_size: 16 # if supported 
  
punctuation:
  podcasts_path: /mnt/disk1tb/radio-v4 # full path to the folder where the chopped podcasts are located 
  model_name: "RUPunct/RUPunct_big" # RUPunct model name 
  num_workers: 2 # per one gpu

accent:
  podcasts_path: /mnt/disk1tb/radio-v4 # full path to the folder where the chopped podcasts are located 
  num_workers: 2 # per one gpu
  model_name: turbo3.1 # ruAccent model name 
  
phonemizer:
  podcasts_path: /mnt/disk1tb/radio-v4 # full path to the folder where the text files are located
  num_workers: 2 # per one gpu
