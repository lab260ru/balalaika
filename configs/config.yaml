# =============================================================================
# Balalaika — config reference (configs/config.yaml)
# =============================================================================
# How it is loaded: each stage calls load_config(config_path, SECTION) and only
# sees that SECTION's mapping. Keys at the root that are not a section name are
# ignored by load_config (except you may read the full file elsewhere).
#
# podcasts_path — use the SAME dataset root in every section that processes
#   on-disk chunks under playlist_id/podcast_id/, unless you know you need
#   different trees.
#
# cache_path (top-level) — not read by load_config-based stages; reserved /
#   used by some benchmarks. Music detection uses separation.music_detect.cache_path
#   if you add it (default ./cache inside that subsection in code).
#
# download — Yandex Music downloader (src/download).
#   NOTE: src/collate.py also loads the "download" section for podcasts_path
#   and num_workers when merging text sidecars into balalaika.parquet. Keep
#   download.podcasts_path aligned with the rest of the pipeline.
#
# preprocess — Sortformer diarization, Smart Turn VAD, chunking, crest filter,
#   loudness normalization (see src/preprocess/preprocess_yaml.sh order).
#
# separation — music detection, DistillMOS, anti-spoofing → balalaika.csv.
#
# transcription — onnx-asr multi-model ASR, optional ROVER (src/transcription).
#
# punctuation — RUPunct on *_rover.txt files.
#
# accent — ruAccent on *_punct.txt (YAML key is accent, not accents).
#
# phonemizer — TryIParu G2P on *_rover.txt → *_rover_phonemes.txt.
#
# denoising — ONNX Runtime / TensorRT MossFormer2_SE_48K in-place speech enhancement.
#
# export — WebDataset tar shards (src/to_webdataset.py); collate parquet uses
#   download section as noted above.
#
# Optional transcription keys (not set below; see src/transcription/transcription.py):
#   model_path, vosk_path — local override paths for onnx-asr load_model.
#   quantization — passed to onnx-asr when set.
#   vad_params — Silero VAD kwargs when use_vad: True.
#
# Logging / observability:
#   Every stage writes a rotating, timestamped log under BALALAIKA_LOG_DIR
#   (default ./logs). Each script also accepts --log_dir on the CLI to override
#   the destination per invocation. See docs/guide.md for tail/grep recipes.
#
# Filter audit / final report:
#   Filtering stages (preprocess, crest_factor, music_detect) append a row
#   with files_in/out and hours_in/out to <podcasts_path>/filter_summary.csv.
#   Run `python -m src.report --config_path configs/config.yaml` (or via
#   src/report_yaml.sh) at the end of a pipeline to render
#   filter_report.md with hours dropped per stage.
#
# CSV liveness:
#   The top-level `csv:` block controls how often per-worker partial CSVs are
#   folded into balalaika.csv during a stage (default every 10 000 rows). This
#   means a Ctrl+C / SIGKILL in the middle of a multi-hour run leaves
#   balalaika.csv at most that many rows behind the on-disk truth, instead of
#   stalling until the next start-up merge.
# =============================================================================

cache_path: ./cache

# -----------------------------------------------------------------------------
# CSV / balalaika.csv state block.
# Read by every stage that touches balalaika.csv (preprocess, crest_factor,
# loudness, music_detect, distillmos, denoising). The shared CSV manager
# (src/utils/csv_manager.py) periodically folds worker partial CSVs into the
# main file during a stage so balalaika.csv always reflects recent work — a
# Ctrl+C / SIGKILL no longer leaves the metadata "stuck" in worker partials
# until the next run.
# -----------------------------------------------------------------------------
csv:
  # Fold worker partial CSVs into balalaika.csv after every N rows of
  # cumulative progress across workers. 0 disables periodic flushing
  # (only the post-stage merge runs). 100 000 rows ≈ a few seconds of pandas
  # work on a multi-million-row CSV; raise it for very large datasets.
  flush_every_rows: 100000
  # Fallback timer: at least flush every N seconds even if the row threshold
  # was not hit. 0 disables the timer.
  flush_every_seconds: 600

# -----------------------------------------------------------------------------
# Runtime / orchestration block.
# Read by base.sh (via src.utils.runtime_env) and by Python modules that need
# TensorRT cache locations or rotating log directories. Edit these instead of
# patching the shell scripts.
# -----------------------------------------------------------------------------
runtime:
  # Python virtualenv that base.sh / *_yaml.sh activate.
  venv_path: .dev_venv
  # CPU range passed to `taskset -c` for CPU-bound stages. Empty ("") disables
  # pinning entirely, which is the safe default: an explicit range that exceeds
  # the host's core count (e.g. "0-80" on a 48-core box) is silently clamped by
  # taskset and a stale range can mis-pin or crash on smaller machines. Set a
  # NUMA-local range manually (e.g. "0-23") for memory-bound stages where you
  # want all workers on one socket; leave empty to let the OS scheduler decide.
  cpu_affinity: ""
  # Default directory for per-stage rotating log files. CLIs accept --log_dir.
  log_dir: ./logs
  # Minimum log level for console and per-stage files. Use DEBUG to include
  # per-file load/save timings and per-batch inference/DataLoader wait timings.
  log_level: INFO
  # Source for stage audio file lists: auto prefers balalaika.csv and falls back
  # to rglob when the CSV is missing/empty; csv never scans and requires an
  # existing balalaika.csv; rglob always scans.
  audio_paths_source: csv
  # Number of file paths per on-disk work shard for multiprocessing stages.
  # Keep this small enough that a worker only materializes a bounded list.
  work_shard_size: 10000
  # Root for TensorRT engine cache. Each session appends /trt_cache_<gpu_id>.
  trt_cache_path: ./cache/trt
  # Per-session TensorRT workspace size in bytes (4 GiB by default).
  trt_workspace_bytes: 4294967296
  # Enable FP16 for TensorRT sessions when supported.
  trt_fp16: True

download:
  # Root directory where downloaded episodes are stored ({podcast_id}/{episode_id}/*.mp3).
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  # Max episodes fetched per playlist when using the downloader.
  episodes_limit: 100
  # Parallel download threads.
  num_workers: 4
  # Optional pickle path with podcast / episode URLs (see download module).
  podcasts_urls_file: ''

preprocess:
  # Dataset root: long-form audio before chunking; after chunking, same tree holds segments.
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  # raw: diarize long-form audio, cut chunks, and write metadata.
  # existing_chunks: do not cut or rewrite audio; diarize every existing audio
  #   file and backfill the same metadata columns that raw preprocess writes
  #   (speaker_id, start/end, total_duration, playlist_id/podcast_id,
  #   silence_percent, max_silence_duration, is_single_speaker).
  input_mode: existing_chunks
  # Used only with input_mode: existing_chunks. Defaults to auto so a fresh
  # pre-chunked dataset can be discovered even when runtime.audio_paths_source
  # is set to csv for later stages.
  existing_chunks_audio_paths_source: auto
  # Used only with input_mode: existing_chunks. false skips rows that already
  # have all preprocess metadata columns; true recomputes and overwrites them.
  existing_chunks_overwrite: false
  # Fuse chunk export, crest filtering, and LUFS normalization into stage 1.
  # Raw mode processes each native-rate chunk before its first/only write.
  # existing_chunks mode combines crest + LUFS in one native-rate read/write.
  # Set false to keep stages 1, 2, and 3 fully independent.
  fuse_audio_preprocessing: true
  # Maximum duration of each output segment in seconds.
  
  duration: 15
  # Worker processes per GPU for diarization+VAD chunking (Sortformer is heavy — often 1).
  num_workers: 1
  # DataLoader batch size for Sortformer diarization source loading.
  diarization_batch_size: 1
  # DataLoader workers per GPU process for Sortformer diarization source loading.
  diarization_loader_workers: 0
  # Number of prefetched batches per diarization DataLoader worker.
  diarization_prefetch_factor: 0
  # Worker processes per GPU for crest factor removal.
  num_workers_crest_factor: 1
  # Crest-factor DataLoader batch size per worker.
  crest_factor_batch_size: 1
  # Crest-factor DataLoader workers inside each process.
  crest_factor_loader_workers: 0
  # Number of prefetched batches per crest-factor DataLoader worker.
  crest_factor_prefetch_factor: 2
  # Delete files whose crest factor (peak / RMS) exceeds this value (linear ratio, not dB).
  # crest_factor is saved to balalaika.csv for all files; deleted files also have their CSV row removed.
  crest_treshold: 10
  # True peak ceiling in dBFS before/after loudness step (see preprocess_audio).
  peak: -1.0
  # Target integrated loudness in LUFS (ITU-R BS.1770-4 meter in code).
  loudness: -23.0
  # Block size in seconds for loudness measurement windows.
  block_size: 0.400
  # Worker processes for loudness normalization.
  loudness_num_workers: 1
  # Loudness-normalization DataLoader batch size per process.
  loudness_batch_size: 1
  # Loudness-normalization DataLoader workers inside each process.
  loudness_loader_workers: 0
  # Number of prefetched batches per loudness-normalization DataLoader worker.
  loudness_prefetch_factor: 2
  # Max audio length in seconds fed to Sortformer at once; longer files are windowed.
  chunk_duration: 900
  # Output container for chunked segments. 'auto' preserves the source extension
  # so FLAC inputs stay FLAC (lossless); set explicitly to 'flac' / 'wav' /
  # 'mp3' / 'ogg' / 'opus' to force a specific container regardless of input.
  chunk_format: auto
  # Minimum acceptable segment length (seconds) when filtering single-speaker
  # diarization output. Below this, the segment is dropped before EOS refinement.
  min_segment_duration: 1.0
  # Hard floor for a chunk to actually be written to disk (seconds). Below this
  # value the chunk is silently skipped (e.g. 100 ms artefacts from VAD).
  min_save_duration: 0.5
  # Maximum silence gap allowed when merging same-speaker pieces before an EOS
  # boundary is reached. Low EOU is buffered, but only chunks ending with good
  # EOU are saved; overflow before the final good EOU is discarded.
  max_merge_gap: 0.5
  # ONNX Sortformer weights for streaming diarization.
  sortformer_model: ./models/diar_streaming_sortformer_4spk-v2.1.onnx
  # Use TensorRT execution provider for Sortformer ONNX Runtime session (needs CUDA+TensorRT).
  use_tensorrt: True
  vad_args:
    # Smart Turn end-of-turn ONNX model path.
    smart_vad_model: ./models/smart-turn-v3.2-gpu.onnx
    # Smart Turn probability threshold for cutting/refining segment ends.
    smart_vad_threshold: 0.4
    # Audio sample rate expected by Smart Turn / Whisper feature extraction.
    smart_vad_sample_rate: 16000

separation:
  # Root containing chunked audio and balalaika.csv.
  podcasts_path: /mnt/hdd_6tb_1/yandex_data

  music_detect:
    # Inference batch size for music classifier.
    bs: 8
    # DataLoader worker processes per GPU worker.
    num_workers: 8
    # Fine-tuned WavLM music-detector weights (safetensors).
    music_detect_model: ./models/music_detection.safetensors
    # If P(music) > threshold, the file is deleted and its CSV row removed.
    # music_prob is saved to balalaika.csv for all processed files.
    threshold: 0.6
    # Optional: HF model id for WavLM backbone (default microsoft/wavlm-base-plus in code).
    # base_model: microsoft/wavlm-base-plus
    # Optional: directory for per-worker audio length cache (default ./cache).
    # cache_path: ./cache

  distillmos:
    # DistillMOS inference batch size per GPU worker.
    batch_size: 8
    # DataLoader workers per GPU worker for decoding/resampling audio.
    num_workers: 8
    # Number of prefetched batches per DataLoader worker.
    prefetch_factor: 4

  distillmos_filter:
    # DistillMOS threshold. Files with DistillMOS below this are deleted.
    # Set to null → manual interactive mode. Set to a float → automatic mode.
    threshold: 3.0
    # Parallel worker processes for deletion + CSV updates.
    num_workers: 8

  antispoofing:
    # Spectra-0 ONNX model. If missing, the stage downloads it from Hugging Face.
    onnx_path: ./models/spectra_0.onnx
    # Batch and DataLoader settings per GPU worker.
    batch_size: 8
    num_workers: 4
    prefetch_factor: 2
    # TensorRT is supported when the exported ONNX has compatible dynamic batch profile.
    use_tensorrt: False

  antispoofing_filter:
    # Delete when score_spoof - score_bonafide > threshold.
    # 0.0 is the raw model argmax decision; null enables interactive selection.
    threshold: 0.0
    # Parallel CPU workers used only for deleting selected files.
    num_workers: 8

transcription:
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  model_names:
    - gigaam-v3-e2e-ctc
    - giga_ctc
    - giga_rnnt
    - vosk
    - tone
  consensus_num: 3
  with_timestamps: True
  use_tensorrt: True
  use_vad: False
  use_rover: True
  # CPU processes for ROVER shard aggregation.
  rover_workers: 4
  batch_size: 8
  num_workers: 16
  prefetch_factor: 4
  retry_empty_outputs: True

punctuation:
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  # Hugging Face model id for RUPunct.
  model_name: "RUPunct/RUPunct_big"
  # Parallel worker count for punctuation jobs (see punctuation.py).
  num_workers: 1

accent:
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  num_workers: 1
  # ruAccent package model tag (e.g. turbo3.1).
  model_name: turbo3.1
  # TensorRT EP for ruAccent ONNX path when supported.
  # Disabled — ruAccent model uses UINT8 casts unsupported by TensorRT.
  use_tensorrt: False

phonemizer:
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  num_workers: 1

denoising:
  # Root containing chunked audio and balalaika.csv.
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  # MossFormer2_SE_48K dynamic ONNX. If missing, it is downloaded from Hugging Face.
  onnx_path: ./models/MossFormer2_SE_48K_dynamic_fp32.onnx
  # Fill after uploading the ONNX model.
  # Batch and DataLoader settings per GPU worker.
  batch_size: 2
  num_workers: 4
  prefetch_factor: 2
  # Number of stage worker processes. 0 = one process per visible GPU.
  processes: 0
  # TensorRT EP uses the shared runtime.trt_cache_path cache.
  use_tensorrt: True

export:
  podcasts_path: /mnt/hdd_6tb_1/yandex_data
  # Parallel processes writing WebDataset shards.
  num_workers: 1
  # Approximate max uncompressed bytes per .tar shard before rolling to next file.
  max_shard_size: 536870912
  # Max samples per shard file.
  max_shard_count: 10000
