cache_path: ./cache

download:
  podcasts_path: /home/nikita/balalaika/datkamatka
  episodes_limit: 100 # limit on downloading episodes from one playlist
  num_workers: 4
  podcasts_urls_file: '' # pkl with urls
  
preprocess:
  podcasts_path: /home/nikita/balalaika/datkamatka # full path to the folder where the podcasts are located 
  duration: 15 # in seconds (each sample will be no longer than this time.)
  num_workers: 1 # per GPU; keep at 1 — Sortformer is a large model
  crest_treshold: 10 # in dB
  peak: -1.0 # peak normalization level in dB
  loudness: -23.0 # target loudness level in LUFS
  block_size: 0.400 # block size for loudness measurement in seconds
  chunk_duration: 900 # max chunk duration for Sortformer (seconds). Audio >15 min is split.
  sortformer_model: ./models/diar_streaming_sortformer_4spk-v2.1.onnx
  vad_args:
    smart_vad_model: ./models/smart-turn-v3.0.onnx
    smart_vad_threshold: 0.4

separation:
  podcasts_path: /home/nikita/balalaika/datkamatka # full path to the folder where the chopped podcasts are located

  nisqa:
    bs: 32
    num_workers: 12
    nisqa_config_path: ./configs/nisqa_b.yaml

  music_detect:
    bs: 32
    num_workers: 1 # per gpu
    music_detect_model: ./models/music_detection.safetensors
    threshold: 0.6

transcription:
  podcasts_path: /home/nikita/balalaika/datkamatka # full path to the folder where the chopped podcasts are located 
  consensus_num: 3 # number of models to use for consensus transcription
  with_timestamps: True
  use_tensorrt: True  # enable TensorRT execution provider (requires CUDA + TensorRT installed)
  use_vad: False  # enable Silero VAD for long-form audio (>30s)
  use_rover: True  # enable ROVER consensus aggregation (requires rover module)
  # All models are loaded via onnx-asr from HuggingFace (or local path).
  # Supported: giga_ctc, giga_rnnt, vosk, vosk_small, tone, parakeet_v2, parakeet_v3, canary, whisper_base, whisper_turbo
  model_names: ['giga_ctc', 'giga_rnnt', 'vosk', 'tone']

  giga:
    batch_size: 16
    # quantization: int8  # optional: int8 quantization for faster CPU/GPU inference

  vosk:
    batch_size: 16
    # vosk_path: ./models/vosk-model-ru  # optional: local model directory (otherwise downloaded from HF)

  tone:
    batch_size: 16
  
punctuation:
  podcasts_path: /home/nikita/balalaika/datkamatka # full path to the folder where the chopped podcasts are located 
  model_name: "RUPunct/RUPunct_big" # RUPunct model name 
  num_workers: 1 # per one gpu

accent:
  podcasts_path: /home/nikita/balalaika/datkamatka # full path to the folder where the chopped podcasts are located 
  num_workers: 1 # per one gpu
  model_name: turbo3.1 # ruAccent model name 
  
phonemizer:
  podcasts_path: /home/nikita/balalaika/datkamatka # full path to the folder where the text files are located
  num_workers: 1 # per one gpu
